# Engineering Manager workflow configuration
# Consumed by scripts/sprintkit (loaded via sprintkit/config.py) and the
# /sprint-report pipeline. Fill projectKey (and optionally cloudId) before the
# first live Jira run. projectKey is the default for sprint-report when the
# user does not specify a project; epic commands derive project from the epic key.
# Resolve an empty cloudId with Atlassian MCP getAccessibleAtlassianResources.

jira:
  cloudId: "ba5d328f-f4a3-4652-ba4d-aba5e33ecabd"
  siteUrl: https://physicswallah001.atlassian.net   # Base URL for clickable issue links
  projectKey: "VP"             # Default project for sprint-report JQL (override via --project)
  boardId: 189                  # Optional; for board-scoped queries
  allowedIssueTypes:
    - Epic
    - Story
    - Task
    - Sub-task
    - Bug
  activeSprintJql: >-
    project = {projectKey} AND sprint in openSprints()
    AND issuetype in (Epic, Story, Task, Sub-task, Bug)
  sprintDiscovery:
    autoDiscover: true           # use getJiraIssueTypeMetaWithFields if sprint field empty

fields:
  originalEstimate: timeoriginalestimate
  timeSpent: timespent           # Bug effort fallback when Original Estimate is empty
  sprint: customfield_10020      # Jira Cloud default; overwritten after auto-discovery
  rank: customfield_10019        # Jira Rank (LexoRank); drag-and-drop backlog order
  startDate: customfield_10015   # Jira Cloud Start date; auto-discovered if wrong
  teams: customfield_10218       # Jira Teams select field (secondary team source)

epicEstimation:
  epicScopeJql: >-
    (key = {epicKey} OR "Epic Link" = {epicKey} OR parent = {epicKey})
    AND issuetype in (Epic, Story, Task, Sub-task, Bug)
  taskScopeJql: >-
    parent in ({parentKeys})
    AND issuetype in (Epic, Story, Task, Sub-task, Bug)
  subtaskScopeJql: >-
    parent in ({taskKeys})
    AND issuetype in (Epic, Story, Task, Sub-task, Bug)

scheduling:
  hoursPerDay: 8
  workingDays: [Mon, Tue, Wed, Thu, Fri]
  # Python engine uses weekday ints: Mon=0 .. Sun=6
  workingDayInts: [0, 1, 2, 3, 4]
  timezone: Asia/Kolkata

teams:
  backend: [backend, be, api]
  frontend: [frontend, fe, web]
  mobile: [mobile, ios, android]
  qa: [qa, test, testing]

priorityOrder:
  - Highest
  - High
  - Medium
  - Low
  - Lowest

statusPhaseMap:
  "To Do": PRD Tech Discussion
  "TO  DO": PRD Tech Discussion
  "Tech Assessment": Tech Assessment
  "In Progress": Development
  "In  Progress": Development
  "In Development": Development
  "In Review": Development
  "In Code Review": Development
  "Dev Complete": Development
  "QA": QA Testing
  "In QA": QA Testing
  "IN QA": QA Testing
  "Ready For QA": QA Testing
  "Bug Fix": Bug fixes
  "Pre-Prod": Pre-Prod Deployments
  "UAT": Product UAT and Design Review
  "Ready for Release": Ready for Release
  "Ready for release": Ready for Release
  Done: Ready for Release
  Closed: Ready for Release
  "Closed.": Ready for Release
  Deferred: PRD Tech Discussion

reporting:
  outputDir: reports
  filenamePattern: sprint-{date}.md
  prdTitleSuffix: PRD   # Title suffix for PRD epics (display only; sort uses Jira Rank)

workflow:
  # Optional override for epic canvas output (default: ~/.cursor/projects/<workspace>/canvases/)
  # canvasDir: ~/.cursor/projects/Users-easygautam-Documents-Sprint-Automation/canvases

slack:
  channel: gautam-personal-agent
  botTokenEnv: SLACK_BOT_TOKEN
  channelIdEnv: SLACK_CHANNEL_ID
  # Local: copy .env.example → .env.local. Cloud: add SLACK_BOT_TOKEN in Dashboard → Cloud Agents → Secrets.
  envFiles:
    - .env.local
    - .env
  # channelId: C0123456789   # optional — recommended for cloud (avoids channels.list lookup)

# Data quality: bug time flags use status lists below (whitespace/case normalized)
dataQuality:
  bugActiveStatuses:
    - "To Do"
    - "In Progress"
    - "Hold"
    - "Deferred"
  bugNoWorklogStatuses:
    - "Not a Bug"

# First segment before '|' in issue summary → team (case-insensitive: BE, be, Be, etc.)
teamPrefixMapping:
  qa:
    aliases: [qa]
  data_engineering:
    aliases: [ds, de]
  backend:
    aliases: [be, backend, api, dag, ppadmin, admin]
  frontend:
    aliases: [web, website, frontend, frontent, fe]
  mobile:
    aliases: [mobile, app, android, ios]

# Jira Teams option value → internal team key (Teams plan row); title prefix wins first
teamFieldMapping:
  Android: mobile
  IOS: mobile
  KMM: mobile
  Admin: backend
  Backend: backend
  Data Engineering: data_engineering
  DevOps: devops
  Web: frontend
  QA: qa
  Product: product_design
  Analytics: product_design

# Execution stages + schedule deps: DE/DevOps deliver on Backend platform
teamDeliveryPlatform:
  backend: backend
  data_engineering: backend
  devops: backend

teamFieldUatValues: [Product, Analytics]

timeline:
  hoursPerDay: 6
  leaveTaskPrefixes:
    generic: "Leave |"
    planned: "Leave | Planned"
    unplanned: "Leave | Unplanned"
  sideDisplay:
    backend: Backend
    frontend: Web
    mobile: Mobile
    data_engineering: "Data Engineering"
    devops: DevOps
    product_design: "Product + Design"
    qa: QA
    other: Other
    unknown: Other
  # Pipe-prefix Task/Sub-task with no stage rule → Development on that platform
  defaultTaskByTeam:
    backend: Development
    frontend: Development
    mobile: Development
  effortBuffers:
    bugFixesPercentOfDevelopment: 0.10
    stageFinalTestingPercentOfStageTesting: 0.10
    backendVerificationPercentOfFeDevelopment: 0.15
    backendVerificationMaxDays: 2
  executionStages:
    backend:
      - Tech Solutioning
      - QA Test Planning
      - Development
      - Stage testing
      - Bug fixes
      - Stage final testing
      - Prod release
      - Prod final testing
      - Go live date
    frontend:
      - Tech Solutioning
      - QA Test Planning
      - Development
      - Stage testing
      - Bug fixes
      - Stage final testing
      - Pre-Prod testing
      - UAT
      - Go live date
    mobile:
      - Tech Solutioning
      - QA Test Planning
      - Development
      - Stage testing
      - Bug fixes
      - Stage final testing
      - Pre-Prod testing
      - UAT
      - Go live date
  # Stage mapping is pipe-segment based in scripts/sprintkit/stages.py (not keyword rules).
