# Engineering Manager workflow configuration
# Fill projectKey (and optionally cloudId) before first live Jira run.

jira:
  cloudId: "ba5d328f-f4a3-4652-ba4d-aba5e33ecabd"
  siteUrl: https://physicswallah001.atlassian.net
  projectKey: "VP"             # Replace with your Jira project key
  boardId: 189                  # Optional; for board-scoped queries
  activeSprintJql: 'project = {projectKey} AND sprint in openSprints()'
  sprintDiscovery:
    autoDiscover: true           # use getJiraIssueTypeMetaWithFields if sprint field empty

fields:
  originalEstimate: timeoriginalestimate
  timeSpent: timespent           # Bug effort fallback when Original Estimate is empty
  sprint: customfield_10020      # Jira Cloud default; overwritten after auto-discovery
  rank: customfield_10019        # Jira Rank (LexoRank); drag-and-drop backlog order

scheduling:
  hoursPerDay: 8
  workingDays: [Mon, Tue, Wed, Thu, Fri]
  # Python engine uses weekday ints: Mon=0 .. Sun=6
  workingDayInts: [0, 1, 2, 3, 4]
  timezone: Asia/Kolkata

teams:
  backend: [backend, be, api]
  frontend: [frontend, fe, web]
  mobile: [mobile, ios, android]
  qa: [qa, test, testing]

priorityOrder:
  - Highest
  - High
  - Medium
  - Low
  - Lowest

statusPhaseMap:
  "To Do": PRD Tech Discussion
  "TO  DO": PRD Tech Discussion
  "Tech Assessment": Tech Assessment
  "In Progress": Development
  "In  Progress": Development
  "In Development": Development
  "In Review": Development
  "In Code Review": Development
  "Dev Complete": Development
  "QA": QA Testing
  "In QA": QA Testing
  "IN QA": QA Testing
  "Ready For QA": QA Testing
  "Bug Fix": Bug fixes
  "Pre-Prod": Pre-Prod Deployments
  "UAT": Product UAT and Design Review
  "Ready for Release": Ready for Release
  "Ready for release": Ready for Release
  Done: Ready for Release
  Closed: Ready for Release
  "Closed.": Ready for Release
  Deferred: PRD Tech Discussion

reporting:
  outputDir: reports
  filenamePattern: sprint-{date}.md
  prdTitleSuffix: PRD   # Title suffix for PRD epics (display only; sort uses Jira Rank)

# Data quality: bug time flags use status lists below (whitespace/case normalized)
dataQuality:
  bugActiveStatuses:
    - "To Do"
    - "In Progress"
    - "Hold"
    - "Deferred"
  bugNoWorklogStatuses:
    - "Not a Bug"

# First segment before '|' in issue summary → team (case-insensitive: BE, be, Be, etc.)
teamPrefixMapping:
  qa:
    aliases: [qa]
  backend:
    aliases: [be, backend, api, dag, ppadmin, admin]
  frontend:
    aliases: [web, website, frontend, frontent, fe]
  mobile:
    aliases: [mobile, app, android, ios]

timeline:
  hoursPerDay: 6
  leaveTaskPrefixes:
    generic: "Leave |"
    planned: "Leave | Planned"
    unplanned: "Leave | Unplanned"
  sideDisplay:
    backend: Backend
    frontend: Web
    mobile: Mobile
    qa: QA
    other: Other
    unknown: Other
  # Pipe-prefix Task/Sub-task with no stage rule → Development on that platform
  defaultTaskByTeam:
    backend: Development
    frontend: Development
    mobile: Development
  effortBuffers:
    bugFixesPercentOfDevelopment: 0.10
    stageFinalTestingPercentOfStageTesting: 0.10
  executionStages:
    backend:
      - Assessment
      - Development
      - Stage testing
      - Bug fixes
      - Stage final testing
      - Prod release
      - Prod final testing
      - Go live date
    frontend:
      - Assessment
      - Development
      - Stage testing
      - Bug fixes
      - Stage final testing
      - Pre-Prod testing
      - UAT
      - Ready for release
      - Go live date
    mobile:
      - Assessment
      - Development
      - Stage testing
      - Bug fixes
      - Stage final testing
      - Pre-Prod testing
      - UAT
      - Ready for release
      - Go live date
  qaCrossPlatformStages:
    - Test planning
  leaveMappingRules:
    - { keywords: ["leave | planned"], leaveType: planned }
    - { keywords: ["leave | unplanned"], leaveType: unplanned }
  stageMapping:
    - { platform: backend, stage: Prod final testing, keywords: ["prod final", "production final", "uat prod"] }
    - { platform: backend, stage: Prod release, keywords: ["prod release", "production release"], excludeKeywords: ["prod final", "final testing"] }
    - { platform: backend, stage: Go live date, keywords: ["go live"] }
    - { platform: frontend, stage: Ready for release, keywords: ["ready for release"] }
    - { platform: frontend, stage: UAT, keywords: ["uat stage", "uat final", " uat "], excludeKeywords: ["pre-prod", "pre prod"] }
    - { platform: frontend, stage: Pre-Prod testing, keywords: ["pre-prod", "pre prod", "qa web pre-prod", "web pre-prod"] }
    - { platform: mobile, stage: Ready for release, keywords: ["ready for release"] }
    - { platform: mobile, stage: UAT, keywords: ["uat stage", "uat final", " uat "] }
    - { platform: mobile, stage: Pre-Prod testing, keywords: ["pre-prod", "pre prod", "qa mobile pre-prod", "mobile pre-prod"] }
    - { platform: frontend, stage: Go live date, keywords: ["go live"] }
    - { platform: mobile, stage: Go live date, keywords: ["go live"] }
    - { platform: backend, stage: Development, keywords: ["be development", "backend dev", "dag flow", "enhancement"] }
    - { platform: frontend, stage: Development, keywords: ["frontend dev", "web dev"] }
    - { platform: mobile, stage: Development, keywords: ["mobile dev", "android dev", "ios dev"] }
